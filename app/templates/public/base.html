<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title or "首页" }} - {{ product_name }}</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7efe3;
        --bg-soft: rgba(255, 248, 239, 0.92);
        --card: rgba(255, 252, 246, 0.9);
        --card-strong: #fffdf8;
        --ink: #211b18;
        --muted: #76685f;
        --line: rgba(90, 71, 59, 0.14);
        --accent: #c65d2f;
        --accent-strong: #8a3412;
        --accent-soft: rgba(198, 93, 47, 0.12);
        --secondary: #1c776d;
        --secondary-soft: rgba(28, 119, 109, 0.12);
        --success: #136f63;
        --warning: #a55a14;
        --danger: #b03a48;
        --shadow: 0 28px 80px rgba(74, 46, 23, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--ink);
        font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(198, 93, 47, 0.18), transparent 28%),
          radial-gradient(circle at top right, rgba(28, 119, 109, 0.16), transparent 26%),
          linear-gradient(180deg, #fff7ef 0%, #f7efe3 48%, #f3eadc 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.4), transparent 34%),
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.42), transparent 18%);
        opacity: 0.65;
      }

      a {
        color: var(--accent-strong);
        text-decoration: none;
      }

      a:hover {
        color: var(--accent);
      }

      button,
      input {
        font: inherit;
      }

      label {
        display: grid;
        gap: 0.45rem;
        color: var(--ink);
        font-weight: 700;
      }

      .shell {
        position: relative;
        width: min(1180px, calc(100vw - 1.6rem));
        margin: 0 auto;
        padding: 1rem 0 2.5rem;
      }

      .site-header,
      .hero-panel,
      .aside-card,
      .card,
      .mail-item {
        border: 1px solid var(--line);
        background: var(--bg-soft);
        backdrop-filter: blur(12px);
        box-shadow: var(--shadow);
      }

      .site-header {
        display: flex;
        gap: 1rem;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 1.15rem;
        border-radius: 1.35rem;
      }

      .brand {
        display: flex;
        gap: 0.85rem;
        align-items: center;
      }

      .brand-mark {
        width: 2.75rem;
        height: 2.75rem;
        border-radius: 1rem;
        background:
          linear-gradient(135deg, rgba(198, 93, 47, 0.92), rgba(28, 119, 109, 0.88));
        box-shadow: 0 14px 28px rgba(138, 52, 18, 0.22);
      }

      .brand-copy {
        display: grid;
        gap: 0.15rem;
      }

      .brand-copy strong {
        font-size: 1rem;
      }

      .brand-copy span {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .header-actions {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .hero {
        display: grid;
        gap: 1rem;
        grid-template-columns: minmax(0, 1.65fr) minmax(280px, 0.95fr);
        margin-top: 1rem;
      }

      .hero--compact {
        grid-template-columns: minmax(0, 1.8fr) minmax(260px, 0.8fr);
      }

      .hero-panel,
      .aside-card,
      .card {
        border-radius: 1.5rem;
      }

      .hero-panel {
        padding: 1.5rem;
        overflow: hidden;
      }

      .hero-panel::after {
        content: "";
        position: absolute;
        width: 240px;
        height: 240px;
        right: -80px;
        top: -90px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(198, 93, 47, 0.16), transparent 72%);
        pointer-events: none;
      }

      .hero-panel,
      .aside-card {
        position: relative;
      }

      .eyebrow {
        margin: 0 0 0.4rem;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--secondary);
      }

      h1,
      h2,
      h3 {
        margin: 0;
        line-height: 1.08;
      }

      h1 {
        font-family: "Songti SC", "Noto Serif CJK SC", "STZhongsong", serif;
        font-size: clamp(2.3rem, 5vw, 4.4rem);
      }

      .hero--compact h1 {
        font-size: clamp(1.8rem, 4vw, 3rem);
      }

      .lede,
      .muted,
      .section-copy {
        color: var(--muted);
      }

      .lede {
        margin: 0.9rem 0 0;
        max-width: 34rem;
        line-height: 1.75;
        font-size: 1rem;
      }

      .section-copy {
        margin: 0.35rem 0 0;
        line-height: 1.7;
      }

      .tag-row,
      .button-row,
      .pager {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .tag-row {
        margin-top: 1.1rem;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        min-height: 2rem;
        padding: 0.35rem 0.8rem;
        border-radius: 999px;
        border: 1px solid rgba(28, 119, 109, 0.16);
        background: rgba(255, 255, 255, 0.6);
        color: var(--ink);
        font-size: 0.9rem;
        font-weight: 700;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.9rem;
        padding: 0.72rem 1.15rem;
        border: 1px solid transparent;
        border-radius: 999px;
        color: #fffaf4;
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        box-shadow: 0 16px 24px rgba(138, 52, 18, 0.16);
        font-weight: 700;
      }

      .button:hover {
        color: #fff;
        transform: translateY(-1px);
      }

      .button--ghost {
        color: var(--ink);
        background: rgba(255, 255, 255, 0.58);
        border-color: rgba(90, 71, 59, 0.12);
        box-shadow: none;
      }

      .aside-card {
        display: grid;
        gap: 1rem;
        padding: 1.35rem;
        align-content: start;
      }

      .aside-card ol,
      .aside-card ul {
        margin: 0;
        padding-left: 1.15rem;
        color: var(--muted);
        line-height: 1.7;
      }

      .content {
        display: grid;
        gap: 1rem;
        margin-top: 1rem;
      }

      .grid {
        display: grid;
        gap: 1rem;
      }

      .grid.three-up {
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .grid.two-up {
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      }

      .card {
        padding: 1.3rem;
      }

      .card h2 {
        font-size: 1.35rem;
      }

      .section-title {
        display: flex;
        gap: 1rem;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 1rem;
      }

      .notice {
        border-radius: 1.2rem;
        padding: 1rem 1.1rem;
        border: 1px solid rgba(176, 58, 72, 0.18);
        background: rgba(176, 58, 72, 0.08);
        color: #8a2d38;
      }

      .mail-list,
      .attachment-list {
        display: grid;
        gap: 0.9rem;
      }

      .mail-item {
        display: grid;
        gap: 0.8rem;
        padding: 1.1rem 1.15rem;
        border-radius: 1.25rem;
        color: var(--ink);
        transition:
          transform 120ms ease,
          box-shadow 120ms ease,
          border-color 120ms ease;
      }

      .mail-item:hover {
        transform: translateY(-2px);
        border-color: rgba(198, 93, 47, 0.22);
      }

      .mail-head,
      .mail-meta,
      .attachment-item {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      .mail-head strong,
      .attachment-item strong {
        font-size: 1.05rem;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 1.9rem;
        padding: 0.25rem 0.7rem;
        border-radius: 999px;
        border: 1px solid transparent;
        font-size: 0.82rem;
        font-weight: 700;
      }

      .pill--success {
        color: var(--success);
        background: rgba(19, 111, 99, 0.1);
        border-color: rgba(19, 111, 99, 0.16);
      }

      .pill--warning {
        color: var(--warning);
        background: rgba(165, 90, 20, 0.1);
        border-color: rgba(165, 90, 20, 0.16);
      }

      .pill--danger {
        color: var(--danger);
        background: rgba(176, 58, 72, 0.1);
        border-color: rgba(176, 58, 72, 0.16);
      }

      .pill--neutral {
        color: var(--secondary);
        background: rgba(28, 119, 109, 0.08);
        border-color: rgba(28, 119, 109, 0.12);
      }

      .kv-grid {
        display: grid;
        gap: 0.9rem;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }

      .kv-item {
        display: grid;
        gap: 0.25rem;
        padding: 0.95rem 1rem;
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.58);
        border: 1px solid rgba(90, 71, 59, 0.1);
      }

      .kv-item span {
        color: var(--muted);
        font-size: 0.88rem;
      }

      .kv-item strong {
        font-size: 1rem;
      }

      pre,
      code {
        font-family: "IBM Plex Mono", "SFMono-Regular", "Consolas", monospace;
      }

      pre {
        margin: 0;
        padding: 1rem 1.05rem;
        overflow-x: auto;
        border-radius: 1.1rem;
        border: 1px solid rgba(90, 71, 59, 0.1);
        background: var(--card-strong);
        line-height: 1.7;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .table-wrap {
        overflow-x: auto;
      }

      .table {
        width: 100%;
        min-width: 640px;
        border-collapse: collapse;
      }

      .table th,
      .table td {
        padding: 0.85rem 0.75rem;
        text-align: left;
        vertical-align: top;
        border-bottom: 1px solid rgba(90, 71, 59, 0.1);
      }

      .table th {
        color: var(--muted);
        font-size: 0.84rem;
        font-weight: 700;
      }

      .iframe-shell {
        overflow: hidden;
        border-radius: 1.15rem;
        border: 1px solid rgba(90, 71, 59, 0.1);
      }

      iframe {
        display: block;
        width: 100%;
        min-height: 34rem;
        border: 0;
        background: #fff;
      }

      .empty-state {
        display: grid;
        gap: 0.5rem;
        place-items: start;
        padding: 1.25rem;
        border-radius: 1.2rem;
        border: 1px dashed rgba(90, 71, 59, 0.22);
        background: rgba(255, 255, 255, 0.46);
      }

      .lookup-form {
        display: grid;
        gap: 0.8rem;
        margin-top: 1.35rem;
      }

      .lookup-row {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .lookup-form input {
        flex: 1 1 18rem;
        min-height: 3rem;
        padding: 0.78rem 1rem;
        border-radius: 1rem;
        border: 1px solid rgba(90, 71, 59, 0.14);
        background: rgba(255, 255, 255, 0.72);
        color: var(--ink);
        outline: none;
      }

      .lookup-form input:focus {
        border-color: rgba(198, 93, 47, 0.32);
        box-shadow: 0 0 0 4px rgba(198, 93, 47, 0.08);
      }

      .site-footer {
        margin-top: 1rem;
        padding: 0 0.2rem;
        color: var(--muted);
        font-size: 0.92rem;
      }

      @media (max-width: 880px) {
        .hero,
        .hero--compact {
          grid-template-columns: 1fr;
        }

        .site-header {
          align-items: flex-start;
          flex-direction: column;
        }

        .header-actions,
        .lookup-row,
        .button-row,
        .pager {
          width: 100%;
        }

        .header-actions > *,
        .lookup-row > *,
        .button-row > * {
          flex: 1 1 auto;
        }

        .table {
          min-width: 560px;
        }
      }

      @media (max-width: 640px) {
        .shell {
          width: min(100vw - 1rem, 1180px);
        }

        .site-header,
        .hero-panel,
        .aside-card,
        .card,
        .mail-item {
          border-radius: 1.1rem;
        }

        h1 {
          font-size: clamp(2rem, 12vw, 2.9rem);
        }
      }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body>
    <div class="shell">
      <header class="site-header">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true"></div>
          <div class="brand-copy">
            <strong>{{ product_name }}</strong>
            <span>公开邮箱浏览、邮件正文预览与附件下载</span>
          </div>
        </div>
        <div class="header-actions">
          <a class="button button--ghost" href="/">首页</a>
          <a class="button" href="/admin/login">管理后台</a>
        </div>
      </header>

      {% block hero %}{% endblock %}

      <main class="content">
        {% block content %}{% endblock %}
      </main>

      <footer class="site-footer">
        公开页面仅展示已经启用网页访问的邮箱内容，原始邮件、网页正文与附件都由系统直接提供。
      </footer>
    </div>
    {% block scripts %}{% endblock %}
  </body>
</html>

{% extends "admin/base.html" %}

{% block content %}
  <section class="card">
    <div class="section-title">
      <div>
        <p class="eyebrow">系统设置</p>
        <h2>当前运行参数</h2>
        <p class="section-copy">这里展示系统当前的关键运行配置，方便核对接收限制与后台会话参数。</p>
      </div>
    </div>
    {% if settings_items %}
      <dl class="kvs">
        {% for item in settings_items %}
          <dt>{{ item.label }}</dt>
          <dd>
            <div class="stack-meta">
              <strong>{{ item.value }}</strong>
              <span class="muted">{{ item.hint }}</span>
            </div>
          </dd>
        {% endfor %}
      </dl>
    {% else %}
      <div class="empty-state">当前没有可展示的系统设置。</div>
    {% endif %}
  </section>
{% endblock %}

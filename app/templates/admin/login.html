<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title or "管理员登录" }} - {{ admin_product_name }}</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-0: #07111f;
        --bg-1: #0d1930;
        --panel: rgba(9, 18, 34, 0.9);
        --border: rgba(142, 177, 224, 0.16);
        --text: #edf3fb;
        --muted: #8ea7c7;
        --accent: #69d8c4;
        --accent-strong: #2db6a3;
        --secondary: #ffb56d;
        --danger: #ff8f98;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(105, 216, 196, 0.18), transparent 28%),
          radial-gradient(circle at bottom right, rgba(255, 181, 109, 0.14), transparent 24%),
          linear-gradient(180deg, var(--bg-0), var(--bg-1));
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      .frame {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }

      .card {
        width: min(100%, 32rem);
        border: 1px solid var(--border);
        border-radius: 1.7rem;
        padding: 1.6rem;
        background: var(--panel);
        backdrop-filter: blur(18px);
        box-shadow: 0 28px 90px rgba(2, 6, 23, 0.42);
      }

      .eyebrow {
        margin: 0 0 0.35rem;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: "Songti SC", "Noto Serif CJK SC", "STZhongsong", serif;
        font-size: clamp(1.9rem, 4vw, 2.6rem);
      }

      p {
        margin: 0;
        line-height: 1.6;
      }

      .lede {
        margin-top: 0.75rem;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 1rem;
        margin-top: 1.25rem;
      }

      label {
        display: grid;
        gap: 0.45rem;
        font-size: 0.93rem;
        font-weight: 700;
      }

      input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 0.9rem;
        padding: 0.85rem 1rem;
        color: var(--text);
        background: rgba(15, 23, 42, 0.9);
        outline: none;
      }

      input:focus {
        border-color: rgba(103, 232, 249, 0.55);
        box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.12);
      }

      .actions {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 999px;
        min-height: 2.8rem;
        padding: 0.65rem 1.2rem;
        font-weight: 700;
        color: #f7feff;
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.02);
      }

      .notice {
        border-radius: 1rem;
        padding: 0.85rem 1rem;
        border: 1px solid rgba(253, 164, 175, 0.22);
        background: rgba(253, 164, 175, 0.08);
        color: #ffd2da;
      }

      .fine-print {
        margin-top: 1rem;
        color: var(--muted);
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <section class="card" aria-label="管理员登录">
        <p class="eyebrow">极速收件箱</p>
        <h1>管理台登录</h1>
        <p class="lede">使用初始管理员账号进入后台，统一查看域名、邮箱、邮件、实时 SMTP 活动和 API 密钥。</p>

        {% if error %}
          <div class="notice" role="alert">{{ error }}</div>
        {% endif %}

        <form method="post" action="/admin/login">
          <label>
            用户名
            <input name="username" type="text" value="{{ username or '' }}" autocomplete="username" autofocus />
          </label>
          <label>
            密码
            <input name="password" type="password" autocomplete="current-password" />
          </label>
          <div class="actions">
            <button type="submit">进入管理台</button>
            <span class="fine-print">管理后台通过会话 Cookie 保持登录状态。</span>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>

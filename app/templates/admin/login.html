<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title or "Admin Login" }} - Rapid Inbox Admin</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-0: #050816;
        --bg-1: #0b1221;
        --panel: rgba(15, 23, 42, 0.9);
        --border: rgba(148, 163, 184, 0.18);
        --text: #e5eef8;
        --muted: #8da3bf;
        --accent: #67e8f9;
        --accent-strong: #22d3ee;
        --danger: #fda4af;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        color: var(--text);
        font-family: "IBM Plex Sans", "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(34, 211, 238, 0.16), transparent 28%),
          radial-gradient(circle at bottom right, rgba(103, 232, 249, 0.1), transparent 24%),
          linear-gradient(180deg, var(--bg-0), var(--bg-1));
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      .frame {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 1.5rem;
      }

      .card {
        width: min(100%, 32rem);
        border: 1px solid var(--border);
        border-radius: 1.5rem;
        padding: 1.5rem;
        background: var(--panel);
        backdrop-filter: blur(18px);
        box-shadow: 0 28px 90px rgba(2, 6, 23, 0.42);
      }

      .eyebrow {
        margin: 0 0 0.35rem;
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.8rem, 4vw, 2.4rem);
      }

      p {
        margin: 0;
        line-height: 1.6;
      }

      .lede {
        margin-top: 0.75rem;
        color: var(--muted);
      }

      form {
        display: grid;
        gap: 1rem;
        margin-top: 1.25rem;
      }

      label {
        display: grid;
        gap: 0.45rem;
        font-size: 0.93rem;
        font-weight: 700;
      }

      input {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 0.9rem;
        padding: 0.85rem 1rem;
        color: var(--text);
        background: rgba(15, 23, 42, 0.9);
        outline: none;
      }

      input:focus {
        border-color: rgba(103, 232, 249, 0.55);
        box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.12);
      }

      .actions {
        display: flex;
        gap: 0.75rem;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 999px;
        min-height: 2.8rem;
        padding: 0.65rem 1.2rem;
        font-weight: 700;
        color: #f7feff;
        background: linear-gradient(135deg, var(--accent), var(--accent-strong));
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.02);
      }

      .notice {
        border-radius: 1rem;
        padding: 0.85rem 1rem;
        border: 1px solid rgba(253, 164, 175, 0.22);
        background: rgba(253, 164, 175, 0.08);
        color: #ffd2da;
      }

      .fine-print {
        margin-top: 1rem;
        color: var(--muted);
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <section class="card" aria-label="Admin login">
        <p class="eyebrow">Rapid Inbox</p>
        <h1>Rapid Inbox Admin</h1>
        <p class="lede">Sign in with the bootstrap admin credentials to open the dashboard.</p>

        {% if error %}
          <div class="notice" role="alert">{{ error }}</div>
        {% endif %}

        <form method="post" action="/admin/login">
          <label>
            Username
            <input name="username" type="text" value="{{ username or '' }}" autocomplete="username" autofocus />
          </label>
          <label>
            Password
            <input name="password" type="password" autocomplete="current-password" />
          </label>
          <div class="actions">
            <button type="submit">Sign in</button>
            <span class="fine-print">Session cookies are used for the admin HTML surface.</span>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
